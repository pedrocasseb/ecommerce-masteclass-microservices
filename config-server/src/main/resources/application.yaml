spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        health:
          enabled: false
        native:
          search-locations: classpath:/config
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"